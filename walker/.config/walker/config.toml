force_keyboard_focus = true
selection_wrap = true
hide_action_hints = true
theme = "~/.config/walker/style.css"

[ui]
fullscreen = false
width = 300
height = 450
align_x = "center"
align_y = "center"

[placeholders]
"default" = { input = " Search...", list = "No Results" }

[providers]
max_results = 256
default = ["desktopapplications", "websearch"]

[[providers.prefixes]]
prefix = "/"
provider = "providerlist"

[[providers.prefixes]]
prefix = "."
provider = "files"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = "$"
provider = "clipboard"
