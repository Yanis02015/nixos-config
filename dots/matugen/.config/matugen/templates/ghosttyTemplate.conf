# Ghostty theme -> regenerated by matugen on every wallpaper change
# (rotate_wallpaper.sh runs `matugen image`, which processes every template in config.toml).
# Output goes to ~/.cache/ghostty/theme-matugen (kept out of the repo, like the other
# matugen outputs under ~/.cache) ; ghostty/.config/ghostty/config points `theme` at
# that absolute path directly (ghostty requires an absolute path, `~` doesn't expand).
# New ghostty windows pick it up automatically; already-open windows need
# ctrl+shift+, (reload_config) or a restart.
#
# ANSI palette (0-15): red/green/yellow/black/white slots are kept fixed (copied from
# the bundled Ayu theme) since lazydocker/lazygit/btop rely on red=stopped/error,
# green=running/ok, yellow=paused staying legible no matter the wallpaper accent.
# blue/cyan/magenta (slots 4-6 and their bright 12-14 variants) are NOT semantic in
# those apps' default themes -> mapped to primary/secondary/tertiary so lazydocker's
# borders/selection (which can only pick named ANSI colors, no hex) still shift with
# the wallpaper.

palette = 0=#11151c
palette = 1=#ea6c73
palette = 2=#7fd962
palette = 3=#f9af4f
palette = 4={{ colors.primary.default.hex }}
palette = 5={{ colors.tertiary.default.hex }}
palette = 6={{ colors.secondary.default.hex }}
palette = 7=#c7c7c7
palette = 8=#686868
palette = 9=#f07178
palette = 10=#aad94c
palette = 11=#ffb454
palette = 12={{ colors.primary.default.hex }}
palette = 13={{ colors.tertiary.default.hex }}
palette = 14={{ colors.secondary.default.hex }}
palette = 15=#ffffff

background = {{ colors.surface.default.hex }}
foreground = {{ colors.on_surface.default.hex }}
cursor-color = {{ colors.primary.default.hex }}
cursor-text = {{ colors.on_primary.default.hex }}
selection-background = {{ colors.tertiary.default.hex }}
selection-foreground = {{ colors.on_tertiary.default.hex }}
