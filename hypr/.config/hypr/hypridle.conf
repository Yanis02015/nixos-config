general {
    # how the session gets locked. logind's Lock signal (loginctl lock-session,
    # before_sleep_cmd, the timeout listeners below) all route through this.
    # `pidof hyprlock || hyprlock` only spawns a locker if one isn't already up.
    lock_cmd = pidof hyprlock || hyprlock
    unlock_cmd =                                   # let hyprlock exit on its own
    before_sleep_cmd = loginctl lock-session       # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on     # avoid pressing a key twice to wake the display
}

listener {
    timeout = 300                      # 5 min idle -> lock
    on-timeout = loginctl lock-session
}

listener {
    timeout = 360                                            # 6 min idle -> screen off
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r # screen + brightness back on activity
}
