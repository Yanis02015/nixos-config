# NB for rotate_wallpaper.sh: the `background { ... path = ... }` block below is what the
# script's sed rewrites on every wallpaper change. Keep that block + its `path =` line intact.
# matugen gets the colors for accents

source = /home/leabua/.cache/hypr/hyprlock-colors.conf

general {
    ignore_empty_input = true
    # immediate_render = false   # paint the background right away instead of waiting on all resources
}

background {
    monitor =
    color = $base
    path = /home/leabua/Wallpapers/mountains_woods.png
    blur_passes = 2
    blur_size = 5
}

# ----- centred clock + date (top) -----
label {
    monitor =
    text = $TIME
    font_family = Departure Mono
    font_size = 84
    color = $text
    position = 0, 320
    halign = center
    valign = center
    zindex = 5
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_family = Departure Mono
    font_size = 20
    color = $text
    position = 0, 250
    halign = center
    valign = center
    zindex = 5
}

# ----- circular profile photo, centred -----
image {
    monitor =
    path = /home/leabua/Documents/profile_pics/lea1.jpg
    size = 150
    rounding = -1
    border_size = 3
    border_color = $accent
    rotate = 0
    reload_time = -1
    position = 0, 95
    halign = center
    valign = center
    zindex = 10
}

# ----- password field, centred under the profile -----
input-field {
    monitor =
    size = 320, 48
    position = 0, -85
    halign = center
    valign = center

    inner_color = $field_t
    outer_color = rgba(255,255,255,0.18)
    outline_thickness = 1

    font_family = Departure Mono
    font_color = $text

    placeholder_text = <span foreground="##ffffff">Enter Password</span>
    check_color = $accent

    fail_text = <span>$FAIL ($ATTEMPTS)</span>
    fail_color = rgb(d45d75)

    rounding = 20
    shadow_passes = 0
    fade_on_empty = false
    zindex = 10
}

# ----- weather (nerd icon reflects current conditions via wttr.in), bottom-left -----
label {
    monitor =
    text = cmd[update:900000] bash -c 'w=$(curl -s --max-time 6 "wttr.in/?format=%C|%t" 2>/dev/null); cond="${w%%|*}"; temp="${w##*|}"; [ -z "$temp" ] && temp="--"; cl=$(echo "$cond" | tr "[:upper:]" "[:lower:]"); case "$cl" in *thunder*|*storm*) u=f0593;; *snow*|*sleet*|*blizzard*|*ice*) u=f0598;; *rain*|*drizzle*|*shower*) u=f0597;; *fog*|*mist*|*haze*|*overcast*) u=f0591;; *partly*) u=f0595;; *cloud*) u=f0590;; *clear*|*sunny*) h=$(date +%H); if [ "$h" -ge 6 ] && [ "$h" -lt 19 ]; then u=f0599; else u=f0594; fi;; *) u=f0590;; esac; printf "%b %s" "\U000$u" "$temp"'
    font_family = JetBrainsMono Nerd Font
    font_size = 16
    color = $text
    position = 36, 70
    halign = left
    valign = bottom
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0,0,0,0.5)
    zindex = 5
}

# ----- battery (accent pop), bottom-left -----
label {
    monitor =
    text = cmd[update:5000] bash -c 'c=$(cat /sys/class/power_supply/BAT0/capacity); s=$(cat /sys/class/power_supply/BAT0/status); [ "$s" = Charging ] && echo "󰂄 $c%" || echo "󰁾 $c%"'
    font_family = JetBrainsMono Nerd Font
    font_size = 16
    color = $accent
    position = 36, 38
    halign = left
    valign = bottom
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0,0,0,0.5)
    zindex = 5
}

