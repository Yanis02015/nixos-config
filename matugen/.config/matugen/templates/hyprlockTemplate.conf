# Material You colours for hyprlock -> regenerated by matugen on every wallpaper change
# (rotate_wallpaper.sh runs `matugen image`, which processes every template in config.toml).
# Mirrors the quickshell colors.json pipeline so the lock screen shifts with the wallpaper.
# hyprlock accepts rgb(rrggbb) / rgba(rrggbbaa); we strip the leading '#' with hex_stripped.

$accent    = rgb({{colors.primary.default.hex_stripped}})
$accent_t  = rgba({{colors.primary.default.hex_stripped}}e6)
$on_accent = rgb({{colors.on_primary.default.hex_stripped}})

$card      = rgb({{colors.surface_container_high.default.hex_stripped}})
$card_t    = rgba({{colors.surface_container_high.default.hex_stripped}}cc)
$on_card   = rgb({{colors.on_surface.default.hex_stripped}})

$text      = rgb({{colors.on_surface.default.hex_stripped}})
$base      = rgb({{colors.surface.default.hex_stripped}})

# translucent fill for the password field -> a faint dark wash over the wallpaper
$field_t   = rgba({{colors.surface.default.hex_stripped}}59)
