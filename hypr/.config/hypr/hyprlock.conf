# Flamingo:  rgb(242, 205, 205) | #f2cdcd
# Pink:      rgb(245, 194, 231) | #f5c2e7
# Mauve:     rgb(203, 166, 247) | #cba6f7
# Red:       rgb(243, 139, 168) | #f38ba8
# Maroon:    rgb(235, 160, 172) | #eba0ac
# Peach:     rgb(250, 179, 135) | #fab387
# Yellow:    rgb(249, 226, 175) | #f9e2af
# Green:     rgb(166, 227, 161) | #a6e3a1
# Teal:      rgb(148, 226, 213) | #94e2d5
# Sky:       rgb(137, 220, 235) | #89dceb
# Sapphire:  rgb(116, 199, 236) | #74c7ec
# Blue:      rgb(137, 180, 250) | #89b4fa
# Lavender:  rgb(180, 190, 254) | #b4befe
# Text:      rgb(205, 214, 244) | #cdd6f4
# Base:      rgb(30, 30, 46)    | #1e1e2e

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = rgb(30, 30, 46) # Base
    path = /home/leabua/Wallpapers/wallhaven-6lw5ll.jpg
    blur_passes = 2
}

# --- Circular Profile Photo ---
image {
    monitor =
    path = /home/leabua/Documents/profile_pics/lea1.jpg
    size = 230
    rounding = -1
    border_size = 4
    border_color = rgb(180, 190, 254) # Lavender
    rotate = 0
    reload_time = -1
    position = 0, 70
    halign = center
    valign = center
    zindex = 10
}

# --- Password Input ---
input-field {
    monitor =
    size = 300, 55
    position = 0, -100
    halign = center
    valign = center

    # Colors
    inner_color = rgb(49, 50, 68) # Surface0
    outer_color = rgb(203, 166, 247) # Mauve
    outline_thickness = 3

    font_family = JetBrainsMono Nerd Font
    font_color = rgb(205, 214, 244) # Text

    placeholder_text = <span foreground="##cdd6f4">Enter Password</span>
    check_color = rgb(166, 227, 161) # Green
    fail_color = rgb(243, 139, 168)  # Red
    fail_text = <span foreground="##f38ba8"><i>$FAIL ($ATTEMPTS)</i></span>

    rounding = 12
    shadow_passes = 0
    fade_on_empty = false
    zindex = 10
}

auth {
    fingerprint:enabled = true
}
